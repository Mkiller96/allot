services:
  - type: web
    name: allot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:create_app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level debug
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: allot-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '*'
      - key: PYTHON_VERSION
        value: 3.11.11
    plan: free

databases:
  - name: allot-db
    databaseName: allot
    plan: free

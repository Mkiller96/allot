services:
  - type: web
    name: allot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: allot-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '*'
    plan: free

databases:
  - name: allot-db
    databaseName: allot
    plan: free

services:
  - type: web
    name: allot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # pega aqui tu URL: mysql+pymysql://user:pass@host/dbname
      - key: CORS_ORIGINS
        value: https://mkiller96.github.io
    plan: free

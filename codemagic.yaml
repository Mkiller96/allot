# ═══════════════════════════════════════════════════════════════
#  CODEMAGIC — Allot (Control de Gastos Personales)
#  Configuración de builds para Flutter
# ═══════════════════════════════════════════════════════════════

workflows:
  # ─── Workflow: Android Build ─────────────────────────────────
  android-workflow:
    name: Build Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: flutter_app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_ID: "com.allot.app"
        APP_NAME: "Allot"
      flutter_pubspec_path: flutter_app/pubspec.yaml
    triggering:
      events:
        - push
        - pull_request
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
        - pattern: feature/*
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release
      - name: Build Android App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true

  # ─── Workflow: iOS Build ────────────────────────────────────
  ios-workflow:
    name: Build iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: flutter_app
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_ID: "com.allot.app"
        APP_NAME: "Allot"
      flutter_pubspec_path: flutter_app/pubspec.yaml
    triggering:
      events:
        - push
        - pull_request
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/**/*.ipa
      - build/ios/**/*.app
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true

  # ─── Workflow: Web Build ────────────────────────────────────
  web-workflow:
    name: Build Web
    instance_type: mac_mini_m2
    max_build_duration: 30
    working_directory: flutter_app
    environment:
      flutter: stable
      vars:
        APP_ID: "com.allot.app"
        APP_NAME: "Allot"
      flutter_pubspec_path: flutter_app/pubspec.yaml
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build Web
        script: flutter build web --release
    artifacts:
      - build/web/**/*

  # ─── Workflow: Windows Build ────────────────────────────────
  windows-workflow:
    name: Build Windows
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: flutter_app
    environment:
      flutter: stable
      vars:
        APP_ID: "com.allot.app"
        APP_NAME: "Allot"
      flutter_pubspec_path: flutter_app/pubspec.yaml
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: develop
          include: true
          source: true
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build Windows
        script: flutter build windows --release
    artifacts:
      - build/windows/**/*.exe
      - build/windows/**/*.msix

  # ─── Workflow: Tests & Lint ─────────────────────────────────
  test-workflow:
    name: Tests & Lint
    instance_type: mac_mini_m2
    max_build_duration: 30
    working_directory: flutter_app
    environment:
      flutter: stable
      vars:
        flutter_pubspec_path: flutter_app/pubspec.yaml
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze
      - name: Run tests
        script: flutter test
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: false
          failure: true
